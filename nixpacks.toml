[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx prisma db push",
  "npm run build",
  "cp -r public .next/standalone/ || true",
  "mkdir -p .next/standalone/.next/static && cp -r .next/static .next/standalone/.next/ || true"
]

[start]
cmd = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"