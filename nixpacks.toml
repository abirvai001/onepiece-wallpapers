[phases.setup]
nixPkgs = ["nodejs_22"]

# Let Nixpacks run the default npm install — do NOT run npm ci again in build
[phases.install]
cmds = ["npm install --omit=dev --no-audit --no-fund"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx prisma db push",
  "npm run build",
]

[start]
cmd = "npm start"