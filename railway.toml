[build]
builder = "NIXPACKS"
# Do NOT run npm ci here — install already runs in nixpacks.toml
buildCommand = "npx prisma generate && npx prisma db push && npm run build && cp -r public .next/standalone/ || true && mkdir -p .next/standalone/.next/static && cp -r .next/static .next/standalone/.next/ || true"

[deploy]
startCommand = "HOSTNAME=0.0.0.0 node .next/standalone/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3